<script>
/* Viewport-based redirect to desktop build. Skipped inside iframes.
   Preserves ?id=cXXX and #hash. */
(function () {
  if (window.top !== window.self) return;
  if (window.matchMedia('(min-width: 861px)').matches) {
    location.replace('article.html' + location.search + location.hash);
  }
})();
</script>

<script src="data.js"></script>
<script src="i18n.js"></script>
<script>
// ============================================================
// Mobile Article — hydrate from ?id= param (bilingual)
// ============================================================

const T    = (obj, field) => (window.NITRO_I18N ? window.NITRO_I18N.t(obj, field) : (obj && obj[field] != null ? obj[field] : ''));
const CAT  = c => (window.NITRO_LANG === 'en' && c.cat_name_en) ? c.cat_name_en : c.cat;
const READ = c => (window.NITRO_LANG === 'en' && c.read_en) ? c.read_en : c.read;

function audPills(c) {
  if (!c.audience || !c.audience.length) return '';
  return c.audience.map(a => {
    const aud = (window.NITRO_AUDIENCES || []).find(x => x.key === a) || { key: a, label: a };
    return `<span class="aud ${a}">${T(aud, 'label')}</span>`;
  }).join('');
}

function getParam(k) {
  return new URL(location.href).searchParams.get(k);
}

function formatViews(v) {
  const n = parseInt(v.replace(/,/g, ''), 10);
  if (window.NITRO_LANG === 'en') {
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    return v;
  }
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '만';
  return v;
}

function audLabelsFor(c) {
  return c.audience.map(a => {
    const aud = (window.NITRO_AUDIENCES || []).find(x => x.key === a);
    return aud ? T(aud, 'label') : a;
  });
}

const ARTICLE_ID = getParam('id') || 'c002';

function hydrate() {
  const c = NITRO_COLUMNS.find(x => x.id === ARTICLE_ID) || NITRO_COLUMNS[1];
  if (!c) return;

  document.title = T(c, 'title') + ' — Nitro Insights';

  const cidDisplay = c.id.toUpperCase().replace(/^C(\d+)/, 'C-$1');
  document.getElementById('kicker').textContent =
    `COLUMN · ${(c.cat_en || '').toUpperCase()} · ${cidDisplay}`;
  document.getElementById('mini-title').textContent =
    `${(c.cat_en || '').toUpperCase()} · ${cidDisplay}`;
  document.getElementById('art-title').textContent = T(c, 'title');
  document.getElementById('art-dek').textContent = T(c, 'dek');

  document.getElementById('for-whom').innerHTML = audLabelsFor(c).join('<br>');
  document.getElementById('read-time').textContent = READ(c);
  document.getElementById('views').textContent = c.views;

  const author = T(c, 'author');
  document.getElementById('author').textContent = author;
  document.getElementById('author-role').textContent = (c.author_role || '').toUpperCase();
  document.getElementById('av').textContent = author.charAt(0);
  document.getElementById('date').textContent = c.date;

  // Hero
  const hero = document.getElementById('art-hero');
  const heroHk = document.getElementById('hero-hk');
  const hook = (T(c, 'thumb_hook') || '').replace(/\n/g, '<br>');
  hero.className = 'm-art-hero';
  if (c.thumb_mode === 'photo') {
    hero.classList.add('photo');
    hero.innerHTML = `<img src="${c.thumb_img}" alt=""><span class="hk" style="position:absolute;bottom:16px;left:16px;color:#fff;">${hook}</span>`;
  } else if (c.thumb_mode === 'abstract') {
    hero.style.background = c.thumb_bg;
    hero.style.color = c.thumb_fg;
    heroHk.style.fontFamily = 'var(--font-dp)';
    heroHk.style.fontWeight = '500';
    heroHk.style.fontSize = '56px';
    heroHk.style.textAlign = 'center';
    heroHk.innerHTML = hook;
  } else {
    hero.style.background = c.thumb_bg;
    hero.style.color = c.thumb_fg;
    heroHk.innerHTML = hook;
  }
}

function renderBody() {
  const body = (window.NITRO_ARTICLE_BODY && window.NITRO_ARTICLE_BODY[ARTICLE_ID]) || [];
  const host = document.getElementById('m-body');
  host.innerHTML = body.map(b => {
    const text = T(b, 'text');
    if (b.type === 'lede')    return `<p class="lede">${text}</p>`;
    if (b.type === 'h2')      return `<h2 id="${b.id || ''}">${text}</h2>`;
    if (b.type === 'p')       return `<p>${text}</p>`;
    if (b.type === 'callout') return `<div class="callout">${text}</div>`;
    return '';
  }).join('');
}

function renderRelated() {
  const related = NITRO_COLUMNS.filter(c => c.id !== ARTICLE_ID).slice(0, 3);
  const host = document.getElementById('related-list');
  host.innerHTML = related.map(c => {
    const hook = (T(c, 'thumb_hook') || '').replace(/\n/g, '<br>');
    let thumb;
    if (c.thumb_mode === 'photo') {
      thumb = `<div class="thumb photo" style="background:${c.thumb_bg || '#0a0a0b'}"><img src="${c.thumb_img}" alt=""></div>`;
    } else if (c.thumb_mode === 'abstract') {
      thumb = `<div class="thumb abstract" style="background:${c.thumb_bg};color:${c.thumb_fg}"><span class="hk">${hook}</span></div>`;
    } else {
      thumb = `<div class="thumb" style="background:${c.thumb_bg};color:${c.thumb_fg}"><span class="hk">${hook}</span></div>`;
    }
    return `<a class="m-row" href="m-article.html?id=${c.id}">
      ${thumb}
      <div class="body">
        <div class="cat-line"><span class="cat">${c.cat_en}</span>${audPills(c)}</div>
        <div class="t">${T(c, 'title')}</div>
        <div class="meta">
          <span>${c.date.replace(/^\d{4}\./, '')}</span>
          <span class="sep">·</span>
          <span>${READ(c)}</span>
          <span class="sep">·</span>
          <span class="v">${formatViews(c.views)}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

// menu
document.getElementById('ham-btn-art').onclick = () => {
  document.getElementById('menu').classList.add('open');
  document.body.style.overflow = 'hidden';
};
document.getElementById('menu-close').onclick = () => {
  document.getElementById('menu').classList.remove('open');
  document.body.style.overflow = '';
};

// share
function openShare() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-bd').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeShare() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-bd').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('share-btn').onclick = openShare;
document.getElementById('sheet-bd').onclick = closeShare;

// contact
document.getElementById('contact-btn').onclick = () => {
  const msg = window.NITRO_LANG === 'en' ? 'Navigating to contact page.' : '문의 페이지로 이동합니다.';
  alert(msg);
};

// init
hydrate();
renderBody();
renderRelated();

window.scrollTo(0, 0);

// re-render on language change
document.addEventListener('nitro-lang-change', () => {
  hydrate();
  renderBody();
  renderRelated();
});
</script>
